name: Deploy Quarto Blog

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # récupère system/ du repo quarto-shared

      - uses: quarto-dev/quarto-actions/setup@v2

      - run: quarto render

      - name: Générer 404.html
        run: |
          cat > _site/404.html << 'EOF'
          <script>
            window.location.replace("/fr/system/404.html");
          </script>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4